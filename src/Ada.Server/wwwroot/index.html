<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ada</title>
<style>
  :root{
    --paper:#fbf7ef; --paper-1:#f6efe2; --ink:#221e18; --ink-soft:#4a443b; --muted:#7a7264;
    --rule:#e6ddcb; --evergreen:#1f5040; --clay:#a8552e; --clay-tint:#f4e4d9;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{margin:0;background:var(--paper);color:var(--ink);
    font:15px/1.55 "Segoe UI",system-ui,-apple-system,sans-serif;display:flex;flex-direction:column;}
  header{padding:14px 20px;border-bottom:1px solid var(--rule);display:flex;align-items:center;gap:12px;
    background:var(--paper-1);-webkit-app-region:drag;}
  .mono{flex:0 0 34px;height:34px;width:34px;border-radius:50%;background:var(--evergreen);color:var(--paper);
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;
    font-family:Georgia,serif;}
  header h1{font-size:16px;margin:0;font-weight:600;letter-spacing:-.01em;}
  header .sub{color:var(--muted);font-size:12px;margin-top:1px;}
  #log{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;}
  .msg{max-width:80%;padding:10px 14px;border-radius:12px;white-space:pre-wrap;word-wrap:break-word;}
  .me{align-self:flex-end;background:var(--evergreen);color:var(--paper);border-bottom-right-radius:3px;}
  .ada{align-self:flex-start;background:#fff;border:1px solid var(--rule);border-bottom-left-radius:3px;}
  .badge{display:inline-block;font-size:10px;text-transform:uppercase;letter-spacing:.08em;
    color:var(--clay);background:var(--clay-tint);border-radius:10px;padding:1px 8px;margin-top:6px;}
  form{display:flex;gap:10px;padding:14px 20px;border-top:1px solid var(--rule);background:var(--paper-1);}
  #box{flex:1;padding:10px 14px;border:1px solid var(--rule);border-radius:10px;font:inherit;background:#fff;
    color:var(--ink);}
  #box:focus{outline:2px solid var(--evergreen);outline-offset:0;}
  button{padding:10px 18px;border:none;border-radius:10px;background:var(--clay);color:#fff;font:inherit;
    font-weight:600;cursor:pointer;}
  button:disabled{opacity:.5;cursor:default;}
  #approvals{position:absolute;left:0;right:0;bottom:66px;display:flex;flex-direction:column;gap:8px;padding:0 16px;pointer-events:none;}
  .card{pointer-events:auto;background:#fffdf8;border:1px solid var(--rule);border-left:3px solid var(--clay);
    border-radius:8px;padding:12px 14px;box-shadow:0 8px 24px rgba(34,30,24,.16);}
  .card .tier{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--clay);font-weight:700;}
  .card .h{font-weight:600;font-size:13px;margin:2px 0;}
  .card .d{font-family:"JetBrains Mono",ui-monospace,monospace;font-size:12px;color:var(--ink-soft);
    background:#f0e7d6;border-radius:4px;padding:6px 8px;margin:6px 0;word-break:break-all;}
  .card .row{display:flex;gap:8px;margin-top:8px;}
  .card button{flex:0 0 auto;padding:6px 12px;font-size:13px;border-radius:8px;}
  .card .once{background:var(--evergreen);} .card .sess{background:var(--clay);} .card .deny{background:#9e2b1c;}
</style>
</head>
<body>
  <header>
    <div class="mono">A</div>
    <div><h1>Ada</h1><div class="sub">On your machine. In your voice. Under your control.</div></div>
  </header>
  <div id="log"></div>
  <div id="approvals"></div>
  <form id="composer">
    <input id="box" autocomplete="off" placeholder="Ask Ada…" autofocus />
    <button id="send" type="submit">Send</button>
  </form>
<script>
  const log = document.getElementById('log');
  const box = document.getElementById('box');
  const send = document.getElementById('send');
  const form = document.getElementById('composer');

  function bubble(cls){ const d=document.createElement('div'); d.className='msg '+cls; log.appendChild(d);
    log.scrollTop=log.scrollHeight; return d; }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const text = box.value.trim();
    if(!text) return;
    box.value=''; send.disabled=true;
    bubble('me').textContent = text;
    const reply = bubble('ada'); reply.textContent='';

    try {
      const res = await fetch('/api/chat', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ message: text })
      });
      const reader = res.body.getReader();
      const dec = new TextDecoder();
      let buf='', ev='message';
      while(true){
        const {value, done} = await reader.read();
        if(done) break;
        buf += dec.decode(value, {stream:true});
        let i;
        while((i = buf.indexOf('\n\n')) >= 0){
          const frame = buf.slice(0, i); buf = buf.slice(i+2);
          for(const line of frame.split('\n')){
            if(line.startsWith('event:')) ev = line.slice(6).trim();
            else if(line.startsWith('data:')){
              const data = JSON.parse(line.slice(5).trim());
              if(ev==='chunk' && data.text){ reply.textContent += data.text; log.scrollTop=log.scrollHeight; }
              else if(ev==='done' && data.route){
                const b=document.createElement('div'); b.className='badge'; b.textContent=data.route;
                reply.appendChild(document.createElement('br')); reply.appendChild(b);
              }
            }
          }
        }
      }
    } catch(err){ reply.textContent = '… (could not reach Ada: '+err+')'; }
    finally { send.disabled=false; box.focus(); }
  });

  // Approval cards — the agent's gated tools surface here, showing the literal command/paths.
  const approvals = document.getElementById('approvals');
  function approvalCard(a){
    const card = document.createElement('div'); card.className = 'card';
    card.innerHTML = `<div class="tier">${a.tier} · approval needed</div>
      <div class="h">${a.summary}</div><div class="d">${a.detail}</div>
      <div class="row"><button class="once">Approve</button>
      <button class="sess">Approve for session</button><button class="deny">Deny</button></div>`;
    const [once, sess, deny] = card.querySelectorAll('button');
    const decide = (approved, session) => {
      fetch('/api/approvals/' + a.id, { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ approved, session }) });
      card.remove();
    };
    once.onclick = () => decide(true, false);
    sess.onclick = () => decide(true, true);
    deny.onclick = () => decide(false, false);
    approvals.appendChild(card);
  }
  try {
    const es = new EventSource('/api/approvals/stream');
    es.addEventListener('approval', e => approvalCard(JSON.parse(e.data)));
  } catch (_) { /* approvals stream unavailable */ }
</script>
</body>
</html>
