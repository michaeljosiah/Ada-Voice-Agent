<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ada</title>
<style>
  :root{
    --paper:#fbf7ef; --paper-1:#f6efe2; --ink:#221e18; --ink-soft:#4a443b; --muted:#7a7264;
    --rule:#e6ddcb; --evergreen:#1f5040; --clay:#a8552e; --clay-tint:#f4e4d9;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{margin:0;background:var(--paper);color:var(--ink);
    font:15px/1.55 "Segoe UI",system-ui,-apple-system,sans-serif;display:flex;flex-direction:column;}
  header{padding:14px 20px;border-bottom:1px solid var(--rule);display:flex;align-items:center;gap:12px;
    background:var(--paper-1);-webkit-app-region:drag;}
  .mono{flex:0 0 34px;height:34px;width:34px;border-radius:50%;background:var(--evergreen);color:var(--paper);
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;
    font-family:Georgia,serif;}
  header h1{font-size:16px;margin:0;font-weight:600;letter-spacing:-.01em;}
  header .sub{color:var(--muted);font-size:12px;margin-top:1px;}
  #log{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;}
  .msg{max-width:80%;padding:10px 14px;border-radius:12px;white-space:pre-wrap;word-wrap:break-word;}
  .me{align-self:flex-end;background:var(--evergreen);color:var(--paper);border-bottom-right-radius:3px;}
  .ada{align-self:flex-start;background:#fff;border:1px solid var(--rule);border-bottom-left-radius:3px;}
  .badge{display:inline-block;font-size:10px;text-transform:uppercase;letter-spacing:.08em;
    color:var(--clay);background:var(--clay-tint);border-radius:10px;padding:1px 8px;margin-top:6px;}
  form{display:flex;gap:10px;padding:14px 20px;border-top:1px solid var(--rule);background:var(--paper-1);}
  #box{flex:1;padding:10px 14px;border:1px solid var(--rule);border-radius:10px;font:inherit;background:#fff;
    color:var(--ink);}
  #box:focus{outline:2px solid var(--evergreen);outline-offset:0;}
  button{padding:10px 18px;border:none;border-radius:10px;background:var(--clay);color:#fff;font:inherit;
    font-weight:600;cursor:pointer;}
  button:disabled{opacity:.5;cursor:default;}
  #approvals{position:absolute;left:0;right:0;bottom:66px;display:flex;flex-direction:column;gap:8px;padding:0 16px;pointer-events:none;}
  .card{pointer-events:auto;background:#fffdf8;border:1px solid var(--rule);border-left:3px solid var(--clay);
    border-radius:8px;padding:12px 14px;box-shadow:0 8px 24px rgba(34,30,24,.16);}
  .card .tier{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--clay);font-weight:700;}
  .card .h{font-weight:600;font-size:13px;margin:2px 0;}
  .card .d{font-family:"JetBrains Mono",ui-monospace,monospace;font-size:12px;color:var(--ink-soft);
    background:#f0e7d6;border-radius:4px;padding:6px 8px;margin:6px 0;word-break:break-all;}
  .card .row{display:flex;gap:8px;margin-top:8px;}
  .card button{flex:0 0 auto;padding:6px 12px;font-size:13px;border-radius:8px;}
  .card .once{background:var(--evergreen);} .card .sess{background:var(--clay);} .card .deny{background:#9e2b1c;}
  #voiceBtn{position:absolute;left:16px;bottom:78px;padding:8px 14px;border-radius:20px;border:1px solid var(--rule);
    background:#fff;color:var(--ink);font:inherit;cursor:pointer;box-shadow:0 4px 12px rgba(34,30,24,.1);z-index:4;}
  #voiceBtn.on{background:var(--evergreen);color:#fff;border-color:var(--evergreen);}
  #orbWrap{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px;
    background:rgba(251,247,239,.93);z-index:6;}
  .orbhint{color:var(--muted);font-size:13px;}
  #wizard{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;
    background:var(--paper);z-index:8;padding:28px;text-align:center;}
  #wizard .mono{width:64px;height:64px;border-radius:50%;background:var(--evergreen);color:var(--paper-1);display:flex;
    align-items:center;justify-content:center;font-family:Georgia,serif;font-size:34px;font-weight:700;animation:pulse 2.4s ease-in-out infinite;}
  @keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(31,80,64,.4);}50%{transform:scale(1.05);box-shadow:0 0 0 16px rgba(31,80,64,0);}}
  #wizard h2{font-family:Georgia,serif;margin:6px 0 0;}
  #wizard .step{width:100%;max-width:320px;text-align:left;margin-top:6px;}
  #wizard label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
  #wizard select,#wizard input{width:100%;padding:9px 11px;border:1px solid var(--rule);border-radius:8px;margin-top:4px;font:inherit;background:#fff;}
  .profiles{display:flex;gap:8px;}
  .profiles button{flex:1;padding:8px;border:1px solid var(--rule);border-radius:8px;background:#fff;cursor:pointer;font:inherit;}
  .profiles button.sel{background:var(--evergreen);color:#fff;border-color:var(--evergreen);}
  #wzFinish{background:var(--clay);color:#fff;border:none;border-radius:10px;padding:11px 22px;font:inherit;font-weight:600;cursor:pointer;margin-top:10px;}
  #engineToggle{-webkit-app-region:no-drag;margin-left:auto;padding:5px 11px;border-radius:14px;border:1px solid var(--rule);
    background:#fff;color:var(--ink-soft);font:inherit;font-size:12px;cursor:pointer;white-space:nowrap;}
  #engineToggle.browser{background:#2a5670;color:#fff;border-color:#2a5670;}
  .enginenote{font-size:11px;color:var(--ink-soft);padding:5px 20px;background:#eef3f6;border-bottom:1px solid var(--rule);}
  #attachBtn{-webkit-app-region:no-drag;padding:0 12px;border:1px solid var(--rule);border-radius:10px;background:#fff;cursor:pointer;font-size:16px;}
  #attachPreview{padding:0 20px;}
  #attachPreview img.attach,.msg img.attach{max-height:90px;border-radius:8px;display:block;margin-bottom:4px;}
</style>
</head>
<body>
  <header>
    <div class="mono">A</div>
    <div><h1>Ada</h1><div class="sub">On your machine. In your voice. Under your control.</div></div>
    <button id="engineToggle" title="Switch model engine">🖥 Ada (local agent)</button>
  </header>
  <div class="enginenote" id="engineNote" style="display:none"></div>
  <div id="log"></div>
  <div id="approvals"></div>
  <button id="voiceBtn" title="Voice mode (Ctrl+Alt+Space)">🎙 Voice</button>
  <div id="orbWrap"><canvas id="orb" width="220" height="220"></canvas><div class="orbhint">Listening — press Esc or the hotkey to stop</div></div>
  <div id="wizard">
    <div class="mono">A</div>
    <h2>Welcome to Ada</h2>
    <div class="orbhint">On your machine. In your voice. Under your control.</div>
    <div class="step"><label>Choose a profile</label>
      <div class="profiles" id="profiles">
        <button data-p="Private">Private</button><button data-p="Balanced" class="sel">Balanced</button><button data-p="Power">Power</button>
      </div>
    </div>
    <div class="step"><label>Local model — runs in-process, fully private</label>
      <select id="wzModel"></select>
      <button type="button" id="wzModelDl">Download</button>
      <div class="orbhint" id="wzModelStatus"></div>
    </div>
    <div class="step"><label>Or connect a cloud provider (optional)</label>
      <select id="wzProvider"></select>
      <input id="wzKey" type="password" placeholder="API key — leave blank for local only" />
    </div>
    <button id="wzFinish">Finish setup</button>
  </div>
  <div id="attachPreview"></div>
  <form id="composer">
    <input type="file" id="attachInput" accept="image/*" hidden />
    <button type="button" id="attachBtn" title="Attach an image (browser Gemma 4)">📎</button>
    <input id="box" autocomplete="off" placeholder="Ask Ada…" autofocus />
    <button id="send" type="submit">Send</button>
  </form>
<script>
  const log = document.getElementById('log');
  const box = document.getElementById('box');
  const send = document.getElementById('send');
  const form = document.getElementById('composer');

  function bubble(cls){ const d=document.createElement('div'); d.className='msg '+cls; log.appendChild(d);
    log.scrollTop=log.scrollHeight; return d; }

  // Engine: the server-side Ada agent (tools/memory/approvals) or in-browser Gemma 4 (multimodal).
  let engineMode = localStorage.getItem('adaEngine') || 'server';
  let pendingImageUrl = null;
  const engineToggle = document.getElementById('engineToggle');
  const engineNote = document.getElementById('engineNote');
  function renderEngine(){
    if(engineMode === 'browser'){
      engineToggle.textContent = '🌐 Gemma 4 · browser';
      engineToggle.classList.add('browser');
      engineNote.style.display = 'block';
      engineNote.textContent = 'In-browser Gemma 4 — multimodal (text + image), runs locally in this window via WebGPU/WASM. Ada’s tools, memory, and approvals don’t apply on this engine.';
    } else {
      engineToggle.textContent = '🖥 Ada (local agent)';
      engineToggle.classList.remove('browser');
      engineNote.style.display = 'none';
    }
  }
  engineToggle.onclick = () => {
    engineMode = engineMode === 'server' ? 'browser' : 'server';
    localStorage.setItem('adaEngine', engineMode);
    renderEngine();
  };
  renderEngine();

  // Image attach (browser / multimodal)
  const attachInput = document.getElementById('attachInput');
  const attachPreview = document.getElementById('attachPreview');
  document.getElementById('attachBtn').onclick = () => attachInput.click();
  attachInput.onchange = () => {
    const f = attachInput.files[0]; if(!f) return;
    const r = new FileReader();
    r.onload = () => { pendingImageUrl = r.result; attachPreview.innerHTML = `<img class="attach" src="${pendingImageUrl}">`; };
    r.readAsDataURL(f);
  };

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const text = box.value.trim();
    if(!text && !pendingImageUrl) return;
    box.value=''; send.disabled=true;
    const me = bubble('me');
    if(pendingImageUrl){ const im = document.createElement('img'); im.className='attach'; im.src = pendingImageUrl; me.appendChild(im); }
    me.appendChild(document.createTextNode(text));
    const reply = bubble('ada'); reply.textContent = '';
    try {
      if(engineMode === 'browser') await sendBrowser(text, reply);
      else await sendServer(text, reply);
    } catch(err){ reply.textContent = '… ('+err+')'; }
    finally { pendingImageUrl = null; attachPreview.innerHTML = ''; send.disabled = false; box.focus(); }
  });

  async function sendServer(text, reply){
    const res = await fetch('/api/chat', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ message: text })
    });
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let buf='', ev='message';
    while(true){
      const {value, done} = await reader.read();
      if(done) break;
      buf += dec.decode(value, {stream:true});
      let i;
      while((i = buf.indexOf('\n\n')) >= 0){
        const frame = buf.slice(0, i); buf = buf.slice(i+2);
        for(const line of frame.split('\n')){
          if(line.startsWith('event:')) ev = line.slice(6).trim();
          else if(line.startsWith('data:')){
            const data = JSON.parse(line.slice(5).trim());
            if(ev==='chunk' && data.text){ reply.textContent += data.text; log.scrollTop=log.scrollHeight; }
            else if(ev==='done' && data.route){
              const b=document.createElement('div'); b.className='badge'; b.textContent=data.route;
              reply.appendChild(document.createElement('br')); reply.appendChild(b);
            }
          }
        }
      }
    }
  }

  async function sendBrowser(text, reply){
    if(!window.AdaBrowserModel){ reply.textContent = 'Browser engine unavailable.'; return; }
    reply.textContent = 'Loading Gemma 4 in your browser…';
    let first = true;
    await window.AdaBrowserModel.generate(text, pendingImageUrl,
      (tok) => { if(first){ reply.textContent=''; first=false; } reply.textContent += tok; log.scrollTop=log.scrollHeight; },
      (p) => { if(p && p.status === 'progress' && p.file){ reply.textContent = `Downloading ${p.file}… ${Math.round(p.progress || 0)}% (one-time)`; } });
    const badge = document.createElement('div'); badge.className = 'badge'; badge.textContent = 'gemma 4 · browser';
    reply.appendChild(document.createElement('br')); reply.appendChild(badge);
  }

  // Approval cards — the agent's gated tools surface here, showing the literal command/paths.
  const approvals = document.getElementById('approvals');
  function approvalCard(a){
    const card = document.createElement('div'); card.className = 'card';
    card.innerHTML = `<div class="tier">${a.tier} · approval needed</div>
      <div class="h">${a.summary}</div><div class="d">${a.detail}</div>
      <div class="row"><button class="once">Approve</button>
      <button class="sess">Approve for session</button><button class="deny">Deny</button></div>`;
    const [once, sess, deny] = card.querySelectorAll('button');
    const decide = (approved, session) => {
      fetch('/api/approvals/' + a.id, { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ approved, session }) });
      card.remove();
    };
    once.onclick = () => decide(true, false);
    sess.onclick = () => decide(true, true);
    deny.onclick = () => decide(false, false);
    approvals.appendChild(card);
  }
  try {
    const es = new EventSource('/api/approvals/stream');
    es.addEventListener('approval', e => approvalCard(JSON.parse(e.data)));
  } catch (_) { /* approvals stream unavailable */ }

  // ---- Voice Mode (M6): Voxa WSS pipeline + amplitude-reactive orb ----
  const voiceBtn = document.getElementById('voiceBtn');
  const orbWrap = document.getElementById('orbWrap');
  const orb = document.getElementById('orb');
  const octx = orb.getContext('2d');
  let voice = null;

  function setAmp(a){ if (voice) voice.amp = Math.max(voice.amp, a); }

  function drawOrb(){
    if (!voice) return;
    const w = orb.width, h = orb.height, cx = w/2, cy = h/2;
    octx.clearRect(0,0,w,h);
    const r = Math.min(w,h)*0.22 * (1 + voice.amp*1.8);
    const g = octx.createRadialGradient(cx,cy,r*0.2,cx,cy,r);
    g.addColorStop(0,'#2a7a5f'); g.addColorStop(1,'#1f5040');
    octx.fillStyle = g; octx.beginPath(); octx.arc(cx,cy,r,0,Math.PI*2); octx.fill();
    voice.amp *= 0.9;
    requestAnimationFrame(drawOrb);
  }

  async function startVoice(){
    if (voice) return;
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${proto}://${location.host}/voice`);
    ws.binaryType = 'arraybuffer';
    const ac = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
    voice = { ws, ac, amp: 0, playAt: 0, node: null, stream: null };
    orbWrap.style.display = 'flex'; voiceBtn.classList.add('on'); drawOrb();

    ws.onopen = async () => {
      ws.send(JSON.stringify({ type: 'hello' }));
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: { channelCount: 1, sampleRate: 24000 } });
        voice.stream = stream;
        const src = ac.createMediaStreamSource(stream);
        const node = ac.createScriptProcessor(4096, 1, 1);
        voice.node = node;
        node.onaudioprocess = e => {
          const f = e.inputBuffer.getChannelData(0);
          const pcm = new Int16Array(f.length);
          let sum = 0;
          for (let i = 0; i < f.length; i++){ const s = Math.max(-1, Math.min(1, f[i])); pcm[i] = s*0x7fff; sum += s*s; }
          setAmp(Math.sqrt(sum/f.length));
          if (ws.readyState === 1) ws.send(pcm.buffer);
        };
        src.connect(node); node.connect(ac.destination);
      } catch (err) { bubble('ada').textContent = 'Microphone unavailable: ' + err; }
    };

    ws.onmessage = ev => {
      if (typeof ev.data === 'string'){
        const m = JSON.parse(ev.data);
        if (m.type === 'transcription' && m.text) bubble('me').textContent = m.text;
        else if (m.type === 'text' && m.text) bubble('ada').textContent = m.text;
        else if (m.type === 'interruption') voice.playAt = voice.ac.currentTime;
      } else {
        const pcm = new Int16Array(ev.data);
        const buf = ac.createBuffer(1, pcm.length, 24000);
        const ch = buf.getChannelData(0);
        let sum = 0;
        for (let i = 0; i < pcm.length; i++){ ch[i] = pcm[i]/0x7fff; sum += ch[i]*ch[i]; }
        setAmp(Math.sqrt(sum/pcm.length));
        const s = ac.createBufferSource(); s.buffer = buf; s.connect(ac.destination);
        const t = Math.max(ac.currentTime, voice.playAt); s.start(t); voice.playAt = t + buf.duration;
      }
    };
    ws.onclose = stopVoice;
    ws.onerror = () => { bubble('ada').textContent = 'Voice endpoint unavailable (is voice enabled?)'; stopVoice(); };
  }

  function stopVoice(){
    if (!voice) return;
    const v = voice; voice = null;
    try { v.stream && v.stream.getTracks().forEach(t => t.stop()); } catch (_) {}
    try { v.node && v.node.disconnect(); } catch (_) {}
    try { v.ws.readyState <= 1 && v.ws.close(); } catch (_) {}
    try { v.ac.close(); } catch (_) {}
    orbWrap.style.display = 'none'; voiceBtn.classList.remove('on');
  }

  window.adaToggleVoice = () => { voice ? stopVoice() : startVoice(); };
  voiceBtn.onclick = window.adaToggleVoice;
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && voice) stopVoice(); });

  // ---- Setup wizard (M8): first-run, no terminal or JSON ----
  let wzProfile = 'Balanced';
  (async function maybeWizard(){
    let cfg;
    try { cfg = await (await fetch('/api/config')).json(); } catch { return; }
    if (cfg.setupComplete) return;

    const w = document.getElementById('wizard');
    const sel = document.getElementById('wzProvider');
    sel.innerHTML = '<option value="">— none (local only) —</option>' +
      cfg.catalog.map(c => `<option value="${c.id}">${c.label}</option>`).join('');

    // Local ONNX model picker + downloader
    const modelSel = document.getElementById('wzModel');
    try {
      const mj = await (await fetch('/api/models')).json();
      modelSel.innerHTML = mj.models.map(m =>
        `<option value="${m.id}"${m.downloaded ? ' selected' : ''}>${m.label}${m.downloaded ? ' ✓ downloaded' : ''}</option>`).join('');
    } catch (_) {}
    document.getElementById('wzModelDl').onclick = async () => {
      const id = modelSel.value, status = document.getElementById('wzModelStatus');
      status.textContent = 'Starting download…';
      try {
        const res = await fetch('/api/models/' + id + '/pull', { method: 'POST' });
        const reader = res.body.getReader(); const dec = new TextDecoder(); let buf = '', ev = '';
        while (true) {
          const { value, done } = await reader.read(); if (done) break;
          buf += dec.decode(value, { stream: true });
          let i;
          while ((i = buf.indexOf('\n\n')) >= 0) {
            const frame = buf.slice(0, i); buf = buf.slice(i + 2);
            for (const line of frame.split('\n')) {
              if (line.startsWith('event:')) ev = line.slice(6).trim();
              else if (line.startsWith('data:')) {
                const d = JSON.parse(line.slice(5).trim() || '{}');
                if (ev === 'progress') status.textContent = `Downloading ${d.file} (${d.i}/${d.n})…`;
                else if (ev === 'done') status.textContent = 'Model ready ✓';
                else if (ev === 'error') status.textContent = 'Download failed: ' + d;
              }
            }
          }
        }
      } catch (e) { status.textContent = 'Download failed: ' + e; }
    };

    document.querySelectorAll('#profiles button').forEach(b => b.onclick = () => {
      document.querySelectorAll('#profiles button').forEach(x => x.classList.remove('sel'));
      b.classList.add('sel'); wzProfile = b.dataset.p;
    });

    document.getElementById('wzFinish').onclick = async () => {
      const id = sel.value, key = document.getElementById('wzKey').value.trim();
      if (id) await fetch('/api/providers', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ id, key: key || null }) });
      await fetch('/api/config', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ profile: wzProfile, setupComplete: true }) });
      w.style.display = 'none';
    };
    w.style.display = 'flex';
  })();
</script>
<script type="module">
  // In-browser Gemma 4 (multimodal) via Transformers.js — runs locally in the WebView (WebGPU, WASM
  // fallback). Fetches the library + model from the network on first use; the browser caches them
  // afterward. This engine is the model only — Ada's tools/memory/approvals stay on the server engine.
  import { AutoProcessor, Gemma4ForConditionalGeneration, TextStreamer, RawImage }
    from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers';

  const MODEL_ID = 'onnx-community/gemma-4-E2B-it-ONNX';
  let processor = null, model = null, loadingPromise = null;
  const convo = [];

  async function ensureLoaded(onProgress){
    if(model) return;
    loadingPromise ??= (async () => {
      processor = await AutoProcessor.from_pretrained(MODEL_ID, { progress_callback: onProgress });
      model = await Gemma4ForConditionalGeneration.from_pretrained(MODEL_ID, {
        dtype: 'q4f16',
        device: (navigator.gpu ? 'webgpu' : 'wasm'),
        progress_callback: onProgress,
      });
    })();
    await loadingPromise;
  }

  window.AdaBrowserModel = {
    async generate(text, imageDataUrl, onToken, onProgress){
      await ensureLoaded(onProgress);
      const content = [];
      if(imageDataUrl) content.push({ type: 'image', image: await RawImage.fromURL(imageDataUrl) });
      content.push({ type: 'text', text });
      convo.push({ role: 'user', content });

      const inputs = await processor.apply_chat_template(convo, { add_generation_prompt: true, tokenize: true, return_dict: true });
      let full = '';
      const streamer = new TextStreamer(processor.tokenizer, {
        skip_prompt: true, skip_special_tokens: true,
        callback_function: (t) => { full += t; onToken(t); },
      });
      await model.generate({ ...inputs, max_new_tokens: 512, do_sample: false, streamer });
      convo.push({ role: 'assistant', content: [{ type: 'text', text: full }] });
    }
  };
</script>
</body>
</html>
