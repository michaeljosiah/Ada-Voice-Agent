<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ada</title>
<style>
  /* ---- Ada UI: ported from the "Centrali/Aurora" design, rebuilt as vanilla + wired ---- */
  .ada-root{
    --surface:#ffffff; --surface-2:#f6f7f9; --surface-3:#eef0f3; --header:#ffffff;
    --border:#e9eaee; --border-soft:#f1f2f5;
    --text:#23212b; --text-soft:#5b6270; --text-mute:#9aa1ad;
    --field:#ffffff; --field-border:#e3e5ea; --bubble-user:#055a60;
    --teal:#055a60; --coral:#eb5c37; --purple:#6f5cd0;
    --shadow-card:0 14px 34px -12px rgba(17,24,39,.22);
    --font-sans:'Inter','Segoe UI',system-ui,-apple-system,Roboto,'Helvetica Neue',Arial,sans-serif;
  }
  .ada-root[data-theme="dark"]{
    --surface:#141b26; --surface-2:#1b2430; --surface-3:#0f1620; --header:#141b26;
    --border:#2a3340; --border-soft:#222c39;
    --text:#f1f3f6; --text-soft:#9aa4b1; --text-mute:#69727f;
    --field:#1b2430; --field-border:#2f3a48; --bubble-user:#0a7c84;
    --shadow-card:0 14px 34px -12px rgba(0,0,0,.5);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;padding:0;}
  body{font-family:'Inter','Segoe UI',system-ui,sans-serif;overflow:hidden;}
  .ada-root{height:100vh;display:flex;flex-direction:column;background:var(--surface);color:var(--text);
    font:14px/1.5 var(--font-sans);}
  ::-webkit-scrollbar{width:9px;height:9px;}
  ::-webkit-scrollbar-thumb{background:var(--text-mute);opacity:.4;border-radius:8px;border:2px solid transparent;background-clip:padding-box;}
  ::-webkit-scrollbar-track{background:transparent;}
  button{font-family:inherit;cursor:pointer;}
  kbd{font-family:inherit;font-size:11px;padding:2px 7px;border-radius:6px;background:var(--surface-3);border:1px solid var(--border);color:var(--text-soft);font-weight:600;}
  input{font-family:inherit;}
  @keyframes barBounce{from{transform:scaleY(.32);opacity:.6;}to{transform:scaleY(1);opacity:1;}}
  @keyframes breathe{0%,100%{transform:scale(1);opacity:.92;}50%{transform:scale(1.09);opacity:1;}}
  @keyframes ringWave{0%{transform:scale(.7);opacity:.5;}70%{opacity:0;}100%{transform:scale(1.8);opacity:0;}}
  @keyframes shimmer{0%{background-position:-200% 0;}100%{background-position:200% 0;}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  @keyframes dotPulse{0%,100%{opacity:.3;transform:translateY(0);}50%{opacity:1;transform:translateY(-3px);}}
  @keyframes spinSlow{to{transform:rotate(360deg);}}
  @keyframes blink{50%{opacity:0;}}
  .fadeUp{animation:fadeUp .4s cubic-bezier(.16,1,.3,1) both;}

  /* header */
  header{height:54px;flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;
    padding:0 8px 0 18px;background:var(--header);border-bottom:1px solid var(--border-soft);-webkit-app-region:drag;}
  .brand{display:flex;align-items:center;gap:11px;min-width:0;}
  .brand .t{font-size:14.5px;font-weight:700;color:var(--text);letter-spacing:-.01em;line-height:1.1;}
  .brand .s{font-size:11.5px;color:var(--text-mute);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:340px;}
  .hdr-actions{display:flex;align-items:center;gap:2px;-webkit-app-region:no-drag;}
  .ico{width:38px;height:38px;border:none;background:transparent;border-radius:9px;display:flex;align-items:center;justify-content:center;color:var(--text-soft);}
  .ico:hover{background:var(--surface-2);}
  .ico.mute{color:var(--text-mute);}
  .ico.close:hover{background:#fde7e1;color:#cc2e2e;}
  .hdr-sep{width:1px;height:22px;background:var(--border);margin:0 4px;}

  #body{flex:1;min-height:0;display:flex;flex-direction:column;position:relative;}
  .view{flex:1;min-height:0;display:none;flex-direction:column;}
  .view.on{display:flex;}
  .wizrow,.setrow{flex-direction:row;}

  /* main — transcript */
  #log{flex:1;min-height:0;overflow-x:hidden;overflow-y:auto;padding:26px 28px 8px;display:flex;flex-direction:column;gap:18px;}
  .empty{margin:auto;text-align:center;color:var(--text-mute);display:flex;flex-direction:column;align-items:center;gap:14px;}
  .empty .h{font-size:15px;color:var(--text-soft);}
  .mu{align-self:flex-end;max-width:78%;background:var(--bubble-user);color:#fff;padding:11px 16px;border-radius:16px 16px 5px 16px;font-size:14.5px;line-height:1.5;box-shadow:0 4px 12px rgba(5,90,96,.18);white-space:pre-wrap;word-wrap:break-word;}
  .ma{align-self:flex-start;max-width:82%;}
  .ma .lbl{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
  .ma .nm{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--purple);}
  .ma .tx{font-size:14.5px;line-height:1.6;color:var(--text);white-space:pre-wrap;word-wrap:break-word;}
  .route{display:inline-flex;align-items:center;font-size:10.5px;font-weight:700;letter-spacing:.03em;padding:2px 8px;border-radius:6px;background:rgba(5,90,96,.12);color:#055a60;}
  .route.cloud{background:rgba(235,92,55,.13);color:#c2492a;}
  .caret{display:inline-block;width:2px;height:15px;background:var(--purple);margin-left:2px;vertical-align:-3px;animation:blink 1s step-end infinite;}

  /* approval */
  .appr{align-self:stretch;background:var(--surface);border:1.5px solid #f0c8bb;border-radius:14px;padding:16px 18px;box-shadow:var(--shadow-card);}
  .appr .top{display:flex;align-items:center;gap:9px;margin-bottom:10px;}
  .appr .sm{font-size:13.5px;font-weight:700;color:var(--text);}
  .appr .tier{display:inline-flex;align-items:center;font-size:10.5px;font-weight:700;letter-spacing:.03em;padding:2px 8px;border-radius:6px;background:rgba(235,92,55,.13);color:#c2492a;margin-left:auto;}
  .appr .det{font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;font-size:12.5px;line-height:1.5;color:var(--text-soft);background:var(--surface-3);border-radius:9px;padding:11px 13px;margin-bottom:13px;white-space:pre-wrap;word-break:break-word;}
  .appr .row{display:flex;gap:9px;flex-wrap:wrap;}
  .appr button{height:38px;padding:0 16px;border-radius:9px;font-size:13.5px;font-weight:600;border:1.5px solid var(--border);background:var(--surface);color:var(--text-soft);}
  .appr .ok{border:none;background:var(--teal);color:#fff;}
  .appr .no{border-color:#f0c8bb;color:#cc2e2e;}

  /* command bar */
  .cbar-wrap{flex:0 0 auto;padding:14px 28px 24px;}
  .cbar-center{display:flex;align-items:center;justify-content:center;}
  .pill{display:flex;align-items:center;gap:12px;width:100%;background:var(--field);border:1.5px solid var(--field-border);box-shadow:0 8px 22px -10px rgba(17,24,39,.18);}
  .pill.idle{height:58px;padding:0 8px 0 16px;border-radius:29px;}
  .pill.listening,.pill.speaking{height:62px;border-radius:31px;box-shadow:0 10px 26px -10px rgba(17,24,39,.22);}
  .pill.listening{padding:0 10px 0 20px;gap:15px;}
  .pill.speaking{padding:0 22px;gap:15px;}
  .pill.thinking{height:58px;padding:0 26px;border-radius:29px;width:auto;gap:15px;}
  .orbmark{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#0a7c84,#6f5cd0 55%,#eb5c37);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .orbmark i{width:9px;height:9px;border-radius:50%;background:#fff;display:block;}
  #box{flex:1;min-width:0;height:100%;border:none;background:transparent;outline:none;font-size:15px;color:var(--text);}
  .dots{display:flex;gap:4px;flex-shrink:0;}
  .dots i{width:5px;height:5px;border-radius:50%;background:var(--text-mute);display:block;}
  .mic{width:42px;height:42px;border:none;border-radius:50%;background:linear-gradient(135deg,#0a7c84,#6f5cd0 60%,#eb5c37);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 6px 16px rgba(111,92,208,.36);}
  .state-lbl{font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;display:flex;align-items:center;gap:7px;flex-shrink:0;}
  .state-lbl.l{color:var(--coral);} .state-lbl.s{color:var(--purple);}
  .ldot{width:8px;height:8px;border-radius:50%;background:var(--coral);animation:breathe 1.1s ease-in-out infinite;}
  .bars{flex:1;display:flex;align-items:center;gap:3px;overflow:hidden;min-width:0;}
  .bars.s{height:34px;} .bars.l{height:38px;}
  .vtrans{max-width:200px;font-size:13px;color:var(--text-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .stop{width:42px;height:42px;border:none;border-radius:50%;background:#fde7e1;color:#cc2e2e;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .stop i{width:13px;height:13px;border-radius:3px;background:#cc2e2e;display:block;}
  .stop.soft{width:40px;height:40px;background:var(--surface-3);color:var(--text-soft);}
  .spin{position:relative;width:24px;height:24px;flex-shrink:0;}
  .spin i{position:absolute;inset:0;border-radius:50%;border:2.5px solid transparent;border-top-color:var(--purple);border-right-color:var(--teal);animation:spinSlow .9s linear infinite;display:block;}
  .think-tx{font-size:15px;font-weight:500;background:linear-gradient(90deg,var(--text-mute) 25%,var(--text) 50%,var(--text-mute) 75%);background-size:200% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 1.5s linear infinite;}
  .ring{position:relative;width:28px;height:28px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .ring .r{position:absolute;width:28px;height:28px;border-radius:50%;border:2px solid var(--purple);animation:ringWave 1.6s ease-out infinite;}
  .ring .c{width:17px;height:17px;border-radius:50%;background:linear-gradient(135deg,#0a7c84,#6f5cd0 55%,#eb5c37);animation:breathe 1.2s ease-in-out infinite;}
  .hint{text-align:center;margin-top:11px;font-size:11.5px;color:var(--text-mute);}

  /* wizard */
  .rail{width:228px;flex:0 0 auto;background:linear-gradient(170deg,#06474c,#055a60 60%,#04464b);color:#fff;padding:28px 22px;display:flex;flex-direction:column;}
  .rail .brand{margin-bottom:32px;}
  .rail .bt{font-size:15px;font-weight:700;}
  .rsteps{display:flex;flex-direction:column;gap:19px;flex:1;}
  .rstep{display:flex;align-items:center;gap:13px;cursor:pointer;}
  .rcirc{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;background:rgba(255,255,255,.14);color:rgba(255,255,255,.55);}
  .rstep.active .rcirc{background:#fff;color:var(--teal);}
  .rstep.done .rcirc{background:var(--coral);color:#fff;}
  .rlbl{font-size:14px;font-weight:400;color:rgba(255,255,255,.6);}
  .rstep.active .rlbl{font-weight:600;color:#fff;}
  .rfoot{font-size:11px;color:rgba(255,255,255,.45);}
  .wizmain{flex:1;min-width:0;display:flex;flex-direction:column;}
  .wizscroll{flex:1;overflow-y:auto;padding:38px 42px 24px;}
  .eyebrow{font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--purple);margin-bottom:11px;}
  .wztitle{font-size:24px;font-weight:600;color:var(--text);letter-spacing:-.01em;margin-bottom:6px;}
  .wzsub{font-size:14.5px;color:var(--text-soft);margin-bottom:22px;line-height:1.5;}
  .cards{display:flex;flex-direction:column;gap:11px;max-width:560px;}
  .card{border:1.5px solid var(--field-border);background:var(--surface);border-radius:13px;padding:16px;cursor:pointer;transition:border-color .15s,box-shadow .15s;}
  .card.sel{border-color:var(--teal);background:var(--surface-2);box-shadow:0 0 0 3px rgba(5,90,96,.12);}
  .card .cn{font-size:15.5px;font-weight:600;color:var(--text);}
  .card .cd{font-size:13.5px;line-height:1.5;color:var(--text-soft);margin-top:5px;}
  .rec{font-size:10px;font-weight:700;letter-spacing:.04em;padding:2px 7px;border-radius:6px;background:rgba(5,90,96,.12);color:#055a60;margin-left:9px;}
  .mcard{display:flex;align-items:center;gap:12px;padding:13px 15px;border-radius:12px;}
  .kind{font-size:10px;font-weight:700;letter-spacing:.04em;padding:2px 7px;border-radius:6px;flex-shrink:0;}
  .kind.ollama{background:rgba(5,90,96,.12);color:#055a60;} .kind.onnx{background:rgba(111,92,208,.14);color:#6f5cd0;}
  .mcard .ml{font-size:14.5px;font-weight:600;color:var(--text);} .mcard .mm{font-size:12.5px;color:var(--text-mute);}
  .provgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:560px;margin-bottom:18px;}
  .pcard{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:11px;}
  .pmark{width:30px;height:30px;border-radius:8px;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0;}
  .lab{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px;}
  .key{width:100%;max-width:560px;height:44px;padding:0 16px;font-family:ui-monospace,Menlo,monospace;font-size:14px;color:var(--text);background:var(--field);border:1.5px solid var(--field-border);border-radius:10px;outline:none;}
  .key:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(5,90,96,.18);}
  .dlbtn{height:44px;padding:0 20px;border:none;border-radius:11px;background:var(--teal);color:#fff;font-size:14px;font-weight:600;display:inline-flex;align-items:center;gap:9px;}
  .dlbar{height:8px;border-radius:5px;background:var(--surface-3);overflow:hidden;margin-bottom:9px;}
  .dlbar>i{display:block;height:100%;border-radius:5px;background:linear-gradient(90deg,#0a7c84,#6f5cd0);width:0;transition:width .3s;}
  .dlbar.indet>i{width:40%;background-size:200% 100%;background-image:linear-gradient(90deg,#0a7c84,#6f5cd0,#0a7c84);animation:shimmer 1.2s linear infinite;}
  .dlline{font-size:12.5px;color:var(--text-soft);font-family:ui-monospace,Menlo,monospace;}
  .ready-ok{display:flex;align-items:center;gap:9px;height:44px;padding:0 16px;border-radius:11px;background:rgba(76,175,80,.1);color:#3a9c3e;font-size:14px;font-weight:600;}
  .wzfoot{height:72px;flex:0 0 auto;border-top:1px solid var(--border-soft);display:flex;align-items:center;justify-content:space-between;padding:0 36px;}
  .wbtn{height:42px;border-radius:10px;font-size:14px;font-weight:600;}
  .wback{padding:0 18px;border:1.5px solid var(--border);background:var(--surface);color:var(--text-soft);}
  .wskip{padding:0 16px;border:none;background:transparent;color:var(--text-soft);}
  .wnext{padding:0 24px;border:none;background:var(--teal);color:#fff;box-shadow:0 4px 12px rgba(5,90,96,.28);}
  .wcount{font-size:13px;color:var(--text-mute);font-weight:500;}
  .feat{display:flex;align-items:center;gap:13px;}
  .feat .fi{width:34px;height:34px;border-radius:9px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .feat .ft{font-size:13.5px;color:var(--text-soft);}
  .readywrap{display:flex;flex-direction:column;align-items:center;text-align:center;padding-top:8px;}

  /* settings */
  .setnav{width:210px;flex:0 0 auto;background:var(--surface-3);border-right:1px solid var(--border-soft);padding:18px 12px;overflow-y:auto;display:flex;flex-direction:column;gap:16px;}
  .navgrp .gt{font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text-mute);padding:0 12px 8px;}
  .navitem{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;cursor:pointer;font-size:13.5px;font-weight:500;color:var(--text-soft);}
  .navitem.sel{font-weight:600;color:var(--teal);background:var(--surface-2);}
  .navitem .nd{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:var(--text-mute);}
  .navitem.sel .nd{background:var(--teal);}
  .soon{font-size:9px;font-weight:700;letter-spacing:.04em;padding:1px 6px;border-radius:5px;background:rgba(111,92,208,.14);color:var(--purple);margin-left:auto;}
  .setmain{flex:1;min-width:0;display:flex;flex-direction:column;}
  .sethdr{padding:24px 34px 14px;border-bottom:1px solid var(--border-soft);flex:0 0 auto;font-size:20px;font-weight:600;color:var(--text);letter-spacing:-.01em;}
  .setbody{flex:1;overflow-y:auto;padding:18px 34px 30px;}
  .seg{display:flex;gap:4px;padding:4px;background:var(--surface-3);border-radius:11px;max-width:360px;}
  .seg>div{flex:1;text-align:center;padding:8px 0;border-radius:8px;font-size:13.5px;font-weight:500;cursor:pointer;color:var(--text-soft);}
  .seg>div.on{font-weight:600;background:var(--surface);color:var(--teal);box-shadow:0 1px 3px rgba(0,0,0,.12);}
  .srow{display:flex;align-items:center;justify-content:space-between;gap:24px;padding:16px 0;border-bottom:1px solid var(--border-soft);}
  .srow .st{font-size:14.5px;font-weight:600;color:var(--text);} .srow .ss{font-size:12.5px;color:var(--text-mute);}
  .sw{width:40px;height:23px;border-radius:12px;position:relative;flex-shrink:0;background:var(--text-mute);transition:background .2s;}
  .sw.on{background:var(--teal);}
  .sw i{position:absolute;top:2px;left:2px;width:19px;height:19px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.2);transition:left .2s;display:block;}
  .sw.on i{left:19px;}
  .muted{font-size:12.5px;color:var(--text-mute);margin-top:12px;}
  .soonbox{display:flex;flex-direction:column;align-items:center;text-align:center;padding:34px 24px;border:1.5px dashed var(--border);border-radius:14px;}
  .soonbox .ic{width:44px;height:44px;border-radius:12px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;margin-bottom:14px;}
  .pill-note{display:flex;align-items:center;gap:12px;padding:15px 16px;background:var(--surface-2);border:1px solid var(--border);border-radius:12px;margin-bottom:18px;}
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <linearGradient id="aurora" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0a7c84"/><stop offset="0.55" stop-color="#6f5cd0"/><stop offset="1" stop-color="#eb5c37"/></linearGradient>
</defs></svg>

<div class="ada-root" data-theme="light" id="root">
  <header>
    <div class="brand">
      <svg width="26" height="26" viewBox="0 0 64 64" style="flex-shrink:0"><circle cx="22" cy="32" r="5.6" fill="url(#aurora)"/><path d="M30 20.5 A14 14 0 0 1 30 43.5" stroke="url(#aurora)" stroke-width="5" fill="none" stroke-linecap="round"/><path d="M34.6 14 A22 22 0 0 1 34.6 50" stroke="url(#aurora)" stroke-width="4.2" fill="none" stroke-linecap="round" opacity=".62"/><path d="M39.2 7.4 A30 30 0 0 1 39.2 56.6" stroke="url(#aurora)" stroke-width="3.4" fill="none" stroke-linecap="round" opacity=".38"/></svg>
      <div style="min-width:0">
        <div class="t">Ada</div>
        <div class="s" id="headerSub">On your machine · private by default</div>
      </div>
    </div>
    <div class="hdr-actions">
      <button class="ico" id="themeBtn" aria-label="Toggle theme" title="Toggle light/dark"></button>
      <button class="ico" id="settingsBtn" aria-label="Settings" title="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
      <div class="hdr-sep"></div>
      <button class="ico mute" id="minBtn" aria-label="Minimise" title="Minimise"><div style="width:11px;height:1.5px;background:currentColor"></div></button>

<script>
const $ = (s, r=document) => r.querySelector(s);
const root = $('#root');
const host = (m) => { try { window.chrome && window.chrome.webview && window.chrome.webview.postMessage(m); } catch(_){} };

const S = {
  view:'main', theme:'light', themeMode:'light', widget:'idle',
  config:null, onnxModels:[], catalog:[],
  profile:'Balanced', model:'ollama:gemma3:4b', cloudProvider:'', cloudKey:'',
  section:'appearance', autostart:false, sandbox:null, skills:null,

};

/* ---------- theme ---------- */
const SUN = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="17" height="17"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>';
const MOON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="17" height="17"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>';
function applyTheme(){
  let t = S.themeMode;
  if (t === 'system'){ try { t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'; } catch(_){ t='light'; } }
  S.theme = t; root.dataset.theme = t;
  $('#themeBtn').innerHTML = t === 'dark' ? SUN : MOON;
}
function setThemeMode(m){ S.themeMode = m; localStorage.setItem('adaTheme', m); applyTheme(); if (S.view==='settings' && S.section==='appearance') renderSettingsBody(); }
(function initTheme(){ const sv = localStorage.getItem('adaTheme'); S.themeMode = sv || 'system'; applyTheme(); })();
$('#themeBtn').onclick = () => setThemeMode(S.theme === 'dark' ? 'light' : 'dark');

/* ---------- view switching ---------- */
const SUBS = { main:'On your machine · private by default', wizard:'First-time setup', settings:'Settings' };
function setView(v){
  S.view = v;
  for (const id of ['main','wizard','settings']) $('#view-'+id).classList.toggle('on', id===v);
  $('#headerSub').textContent = SUBS[v];
  $('#settingsBtn').style.display = v==='wizard' ? 'none' : '';
  if (v==='main' && !$('#cbar').firstChild) setWidget('idle');
  if (v==='wizard') renderWizard();
  if (v==='settings') renderSettings();
}
$('#settingsBtn').onclick = () => setView(S.view==='settings' ? 'main' : 'settings');
$('#minBtn').onclick = () => host('minimise');
$('#closeBtn').onclick = () => host('hide');

/* ---------- transcript ---------- */
const log = $('#log');
function emptyState(){
  log.innerHTML = '<div class="empty"><svg width="40" height="40" viewBox="0 0 64 64"><circle cx="22" cy="32" r="5.6" fill="url(#aurora)"/><path d="M30 20.5 A14 14 0 0 1 30 43.5" stroke="url(#aurora)" stroke-width="5" fill="none" stroke-linecap="round"/><path d="M34.6 14 A22 22 0 0 1 34.6 50" stroke="url(#aurora)" stroke-width="4.2" fill="none" stroke-linecap="round" opacity=".6"/></svg><div class="h">Ask Ada anything, or hold the mic to talk.</div></div>';
}
function clearEmpty(){ const e = log.querySelector('.empty'); if (e) e.remove(); }
function scrollLog(){ log.scrollTop = log.scrollHeight; }
function esc(t){ const d=document.createElement('div'); d.textContent = t==null?'':t; return d.innerHTML; }
function addUser(text){ clearEmpty(); const d=document.createElement('div'); d.className='mu fadeUp'; d.textContent=text; log.appendChild(d); scrollLog(); return d; }
function addAda(){
  clearEmpty();
  const w=document.createElement('div'); w.className='ma fadeUp';
  w.innerHTML='<div class="lbl"><span class="nm">Ada</span></div><div class="tx"></div>';
  log.appendChild(w); scrollLog();
  return { tx:w.querySelector('.tx'), lbl:w.querySelector('.lbl') };
}
function routeBadge(lbl, route){
  if (!route) return;
  const cloud = route.indexOf('local') !== 0;
  const b=document.createElement('span'); b.className='route'+(cloud?' cloud':''); b.textContent=route;
  lbl.appendChild(b);
}

/* ---------- chat (SSE) ---------- */
async function sendText(text){
  text = (text||'').trim(); if (!text) return;
  addUser(text);
  const reply = addAda();
  reply.tx.innerHTML = '<span style="color:var(--text-mute)">thinking…</span>';
  const caret=document.createElement('span'); caret.className='caret';
  const ctrl = new AbortController();
  let got=false, acc='';
  const to = setTimeout(()=>{ if(!got) ctrl.abort('timeout'); }, 75000);  // a wedged/oversized model never streams
  try {
    const res = await fetch('/api/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ message:text }), signal:ctrl.signal });
    const rd = res.body.getReader(); const dec=new TextDecoder(); let buf='', ev='message';
    while(true){
      const {value, done} = await rd.read(); if (done) break;
      buf += dec.decode(value,{stream:true}); let i;
      while((i=buf.indexOf('\n\n'))>=0){
        const frame=buf.slice(0,i); buf=buf.slice(i+2);
        for(const line of frame.split('\n')){
          if(line.startsWith('event:')) ev=line.slice(6).trim();
          else if(line.startsWith('data:')){
            const d=JSON.parse(line.slice(5).trim());
            if(ev==='chunk' && d.text){ if(!got){ got=true; clearTimeout(to); reply.tx.textContent=''; } acc+=d.text; reply.tx.textContent=acc; reply.tx.appendChild(caret); scrollLog(); }
            else if(ev==='done'){ got=true; clearTimeout(to); if(caret.parentNode) caret.remove();
              if(!acc) reply.tx.textContent='(No reply — the local model returned nothing. Try a different model in Settings → Local model.)';
              routeBadge(reply.lbl, d.route); scrollLog(); }
          }
        }
      }
    }
    clearTimeout(to); if (caret.parentNode) caret.remove();
  } catch(e){
    clearTimeout(to);
    reply.tx.textContent = acc || (ctrl.signal.aborted
      ? 'The local model didn’t respond — it may be too large for your GPU. Pick a smaller one in Settings → Local model.'
      : 'Couldn’t reach the local model (' + e + ').');
  }
}

/* ---------- approvals (SSE) ---------- */
function approvalCard(a){
  clearEmpty();
  const c=document.createElement('div'); c.className='appr fadeUp';
  c.innerHTML =
    '<div class="top"><svg viewBox="0 0 24 24" fill="none" stroke="#eb5c37" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" width="17" height="17"><path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg>'+
    '<span class="sm">'+esc(a.summary)+'</span><span class="tier">'+esc(a.tier)+'</span></div>'+
    '<div class="det">'+esc(a.detail)+'</div>'+
    '<div class="row"><button class="ok">Approve</button><button>Approve for session</button><button class="no">Deny</button></div>';
  const [ok,sess,no]=c.querySelectorAll('button');
  const decide=(approved,session)=>{ fetch('/api/approvals/'+a.id,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({approved,session})}); c.remove(); };
  ok.onclick=()=>decide(true,false); sess.onclick=()=>decide(true,true); no.onclick=()=>decide(false,false);
  log.appendChild(c); scrollLog();
}
try { const es=new EventSource('/api/approvals/stream'); es.addEventListener('approval', e=>approvalCard(JSON.parse(e.data))); } catch(_){}

/* ---------- command bar ---------- */
function barsHTML(n, base, range){
  let h='';
  for(let i=0;i<n;i++){
    const ht = base + Math.round(Math.abs(Math.sin(i*1.4+1))*range);
    const dur = 820 - (i%6)*45, del = -(i*61%760);
    h += '<div style="width:4px;height:'+ht+'px;border-radius:3px;flex-shrink:0;background:linear-gradient(180deg,#6f5cd0,#0a7c84);transform-origin:center;animation:barBounce '+dur+'ms ease-in-out '+del+'ms infinite alternate"></div>';
  }
  return h;
}
const MIC='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" width="19" height="19"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/></svg>';
const XICO='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="16" height="16"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
function setWidget(w){
  S.widget = w; const cb = $('#cbar');
  if (w==='idle'){
    cb.innerHTML = '<div class="pill idle"><div class="orbmark"><i></i></div><input id="box" autocomplete="off" placeholder="Ask Ada anything…" aria-label="Message Ada"><div class="dots"><i style="animation:dotPulse 1.4s ease-in-out 0s infinite"></i><i style="animation:dotPulse 1.4s ease-in-out .2s infinite"></i><i style="animation:dotPulse 1.4s ease-in-out .4s infinite"></i></div><button class="mic" id="micBtn" aria-label="Start voice">'+MIC+'</button></div>';
    const box=$('#box');
    box.onkeydown = e => { if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); const v=box.value; box.value=''; sendText(v); } };
    $('#micBtn').onclick = startVoice;
    box.focus();
  } else if (w==='listening'){
    cb.innerHTML = '<div class="pill listening"><span class="state-lbl l"><span class="ldot"></span>Listening</span><div class="bars l">'+barsHTML(26,8,32)+'</div><div class="vtrans" id="vtrans"></div><button class="stop" id="stopBtn" aria-label="Stop voice"><i></i></button></div>';
    $('#stopBtn').onclick = stopVoice;
  } else if (w==='thinking'){
    cb.innerHTML = '<div class="pill thinking"><div class="spin"><i></i></div><span class="think-tx">Thinking…</span></div>';
  } else if (w==='speaking'){
    cb.innerHTML = '<div class="pill speaking"><div class="ring"><div class="r"></div><div class="c"></div></div><span class="state-lbl s">Speaking</span><div class="bars s">'+barsHTML(20,6,20)+'</div><button class="stop soft" id="stopBtn" aria-label="Stop">'+XICO+'</button></div>';
    $('#stopBtn').onclick = stopVoice;
  }
}
function setTrans(t){ const e=$('#vtrans'); if(e){ e.textContent=t; } }

/* ---------- voice (Voxa WSS) — 16k Int16 PCM in (binary), 22.05k out; no handshake ---------- */
const VOICE_IN_RATE = 16000, VOICE_OUT_RATE = 22050;
let voice = null;
function startVoice(){
  if (voice) return;
  const proto = location.protocol==='https:'?'wss':'ws';
  let ws; try { ws = new WebSocket(proto+'://'+location.host+'/voice'); } catch(e){ return; }
  ws.binaryType='arraybuffer';
  const micCtx = new (window.AudioContext||window.webkitAudioContext)({sampleRate:VOICE_IN_RATE});
  const outRate = (S.voiceInfo && S.voiceInfo.outputRate) || VOICE_OUT_RATE;   // matches the selected TTS voice
  const outCtx = new (window.AudioContext||window.webkitAudioContext)({sampleRate:outRate});
  voice = { ws, micCtx, outCtx, outRate, nextPlay:0, node:null, src:null, stream:null, adaTx:null, sources:[], drain:0, level:0, raf:0 };
  setWidget('listening');
  if (S.voiceReady === false) setTrans('preparing voice models…');
  ws.onopen = async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({audio:{channelCount:1, echoCancellation:true, noiseSuppression:true, autoGainControl:true}});
      if (!voice){ stream.getTracks().forEach(t=>t.stop()); return; }
      voice.stream = stream;
      if (Math.abs(micCtx.sampleRate - VOICE_IN_RATE) > 1) console.warn('mic context rate', micCtx.sampleRate, '(wanted', VOICE_IN_RATE + ')');
      const src = micCtx.createMediaStreamSource(stream); voice.src = src;
      const node = micCtx.createScriptProcessor(2048,1,1); voice.node = node;
      node.onaudioprocess = e => {
        if (!voice || ws.readyState!==1) return;
        const ds = downsampleTo16k(e.inputBuffer.getChannelData(0), micCtx.sampleRate);  // Whisper needs exactly 16 kHz
        let sum=0; const pcm = new Int16Array(ds.length);
        for(let i=0;i<ds.length;i++){ const s=Math.max(-1,Math.min(1,ds[i])); pcm[i]= s<0 ? s*0x8000 : s*0x7fff; sum+=s*s; }
        voice.level = voice.level*0.8 + Math.sqrt(sum/Math.max(1,ds.length))*0.2;  // smoothed mic RMS → bars
        ws.send(pcm.buffer);   // raw Int16-LE mono @16k, binary
      };
      src.connect(node); node.connect(micCtx.destination);
      micLoop();
    } catch(err){ addAda().tx.textContent = 'Microphone unavailable: '+err; stopVoice(); }
  };
  ws.onmessage = ev => {
    if (!voice) return;
    if (typeof ev.data === 'string'){ let m; try { m=JSON.parse(ev.data); } catch(_){ return; } onVoiceMsg(m); }
    else playPcm(new Int16Array(ev.data));
  };
  ws.onclose = () => stopVoice();
  ws.onerror = () => { addAda().tx.textContent = 'Voice endpoint unavailable — open Settings → Voice to check the pipeline and download the speech models.'; stopVoice(); };
}
function onVoiceMsg(m){
  switch(m.type){
    case 'session': if (m.outputSampleRate) voice.outRate = m.outputSampleRate; break;
    case 'transcription':
      if (m.isFinal){ if (m.text) addUser(m.text); setTrans(''); if (S.widget==='listening') setWidget('thinking'); }
      else setTrans(m.text||'');
      break;
    case 'text':
      if (m.text){ if (!voice.adaTx){ setWidget('speaking'); voice.adaTx = addAda(); } voice.adaTx.tx.textContent += m.text; scrollLog(); }
      break;
    case 'speaking':
      if (m.who==='user' && m.started){ if (S.widget!=='speaking') setWidget('listening'); }
      else if (m.who==='bot' && !m.started){ voice.adaTx=null; scheduleListening(); }
      break;
    case 'interruption': flushPlayback(); voice.adaTx=null; break;
    case 'error': addAda().tx.textContent = 'Voice error: '+(m.message||'unknown'); break;
    case 'end': stopVoice(); break;
  }
}
function playPcm(int16){
  if (!voice || !int16.length || int16.byteLength % 2) return;
  if (S.widget!=='speaking') setWidget('speaking');
  const oc=voice.outCtx, f=new Float32Array(int16.length);
  for(let i=0;i<int16.length;i++) f[i]=int16[i]/32768;
  const buf=oc.createBuffer(1,f.length,voice.outRate); buf.copyToChannel(f,0);
  const s=oc.createBufferSource(); s.buffer=buf; s.connect(oc.destination);
  const t=Math.max(oc.currentTime, voice.nextPlay); s.start(t); voice.nextPlay=t+buf.duration;
  voice.sources.push(s); s.onended=()=>{ if(voice) voice.sources=voice.sources.filter(x=>x!==s); };
  scheduleListening();
}
function scheduleListening(){
  if(!voice) return; clearTimeout(voice.drain);
  const wait=Math.max(0,(voice.nextPlay-voice.outCtx.currentTime)*1000)+350;
  voice.drain=setTimeout(()=>{ if(voice && S.widget==='speaking'){ voice.adaTx=null; setWidget('listening'); } }, wait);
}
function flushPlayback(){
  if(!voice) return;
  voice.sources.forEach(s=>{try{s.stop();}catch(_){}}); voice.sources=[];
  voice.nextPlay=voice.outCtx.currentTime;
}
function stopVoice(){
  if(!voice) return; const v=voice; voice=null; clearTimeout(v.drain); try{ cancelAnimationFrame(v.raf); }catch(_){}
  try{ v.stream && v.stream.getTracks().forEach(t=>t.stop()); }catch(_){}
  try{ v.node && v.node.disconnect(); }catch(_){}
  try{ v.src && v.src.disconnect(); }catch(_){}
  try{ v.sources.forEach(s=>{try{s.stop();}catch(_){}}); }catch(_){}
  try{ v.ws.readyState<=1 && v.ws.close(); }catch(_){}
  try{ v.micCtx.close(); }catch(_){}
  try{ v.outCtx.close(); }catch(_){}
  if(S.view==='main') setWidget('idle');
}
function downsampleTo16k(f, inRate){
  if (!(inRate > 16000)) return f;
  const ratio=inRate/16000, outLen=Math.floor(f.length/ratio), out=new Float32Array(outLen);
  for (let i=0;i<outLen;i++){ const idx=i*ratio, i0=idx|0, i1=Math.min(i0+1,f.length-1), fr=idx-i0; out[i]=f[i0]*(1-fr)+f[i1]*fr; }
  return out;
}
function micLoop(){
  if(!voice) return;
  const wrap=document.querySelector('.pill.listening .bars');
  if (wrap && wrap.children.length){ const lvl=Math.min(1,(voice.level||0)*9), t=Date.now()/120;
    for (let i=0;i<wrap.children.length;i++){ const b=wrap.children[i]; b.style.animation='none';
      const base=5+Math.abs(Math.sin(i*1.3+1))*5; b.style.height=Math.min(38, base+lvl*30*(0.55+0.45*Math.sin(i+t))).toFixed(1)+'px'; } }
  voice.raf=requestAnimationFrame(micLoop);
}
window.adaToggleVoice = () => { voice ? stopVoice() : startVoice(); };
window.adaStopVoice = () => { if (voice) stopVoice(); };   // host calls this when Voice mode takes over
window.adaShowView = (v) => {
  if (v === 'main' && S.config && S.config.setupComplete === false) { setView('wizard'); return; }
  if (v === 'main' || v === 'settings' || v === 'wizard') setView(v);
};

/* ---------- data ---------- */
const PROFILES = [
  {id:'Private', name:'Private', desc:'Everything stays on this device. No cloud, ever.'},
  {id:'Balanced', name:'Balanced', desc:'On-device first — escalate to the cloud only for hard tasks.', rec:true},
  {id:'Power', name:'Power', desc:'Always reach for the strongest available model.'},
];
const PROV_STYLE = { anthropic:'#d97757', openai:'#10a37f', google:'#2f6cf2', gemini:'#2f6cf2', mistral:'#eb5c37', azure:'#2b7cd3' };
function modelList(){
  const out = [
    {id:'ollama:gemma3:4b', label:'Gemma 3 · 4B', meta:'recommended · ~3.3 GB · fits most GPUs', kind:'Ollama'},
    {id:'ollama:qwen2.5:7b', label:'Qwen 2.5 · 7B', meta:'~4.7 GB · best on a discrete GPU', kind:'Ollama'},
    {id:'ollama:qwen2.5:1.5b', label:'Qwen 2.5 · 1.5B', meta:'~1 GB · fast, low-resource', kind:'Ollama'},
    {id:'ollama:llama3.2:3b', label:'Llama 3.2 · 3B', meta:'~2 GB · balanced', kind:'Ollama'},
  ];
  for (const m of S.onnxModels) out.push({ id:'onnx:'+m.id, label:m.label+' · ONNX', meta:(m.approxMb?('~'+(m.approxMb/1024).toFixed(1)+' GB'):'in-process')+(m.downloaded?' · installed':''), kind:'ONNX' });
  return out;
}
function providerList(){
  const cat = S.catalog && S.catalog.length ? S.catalog : [{id:'anthropic',label:'Anthropic · Claude'},{id:'openai',label:'OpenAI'},{id:'azure',label:'Azure OpenAI'}];
  return cat.map(c => ({ id:c.id, name:c.label, sub:c.auth||'', mark:(c.label||c.id).trim()[0].toUpperCase(), color:PROV_STYLE[c.id]||'#6f5cd0' }));
}

/* ---------- wizard ---------- */
const WIZ_LABELS = ['Welcome','Profile','Local brain','Cloud','Ready'];
function renderWizard(){ renderRail(); renderWizStep(); }
function renderRail(){
  const r = $('#rsteps'); r.innerHTML='';
  WIZ_LABELS.forEach((label,i)=>{
    const done=i<S.wizStep, active=i===S.wizStep;
    const d=document.createElement('div'); d.className='rstep'+(active?' active':'')+(done?' done':'');
    d.innerHTML='<div class="rcirc">'+(done?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><polyline points="20 6 9 17 4 12"/></svg>':(i+1))+'</div><div class="rlbl">'+label+'</div>';
    d.onclick=()=>{ S.wizStep=i; renderWizard(); };
    r.appendChild(d);
  });
}
function profileCardsHTML(sel, cls){
  return PROFILES.map(p=>'<div class="card '+(p.id===sel?'sel':'')+'" data-p="'+p.id+'"><div style="display:flex;align-items:center"><span class="cn">'+p.name+'</span>'+(p.rec?'<span class="rec">RECOMMENDED</span>':'')+'</div><div class="cd">'+p.desc+'</div></div>').join('');
}
function modelCardsHTML(sel){
  return modelList().map(m=>'<div class="card mcard '+(m.id===sel?'sel':'')+'" data-m="'+m.id+'"><span class="kind '+(m.kind==='Ollama'?'ollama':'onnx')+'">'+m.kind+'</span><div style="flex:1;min-width:0"><div class="ml">'+esc(m.label)+'</div><div class="mm">'+esc(m.meta)+'</div></div></div>').join('');

/* ---------- model download (shared by wizard + settings) ---------- */
async function startDownload(){
  const v=S.model, sep=v.indexOf(':'), kind=v.slice(0,sep), id=v.slice(sep+1);
  const url = kind==='ollama' ? '/api/ollama/setup?model='+encodeURIComponent(id) : '/api/models/'+id+'/pull';
  S.dl={status:'running',model:v,line:'starting…',i:0,n:0};
  refreshDl();
  try {
    const res=await fetch(url,{method:'POST'}); const rd=res.body.getReader(); const dec=new TextDecoder(); let buf='',ev='';
    while(true){
      const {value,done}=await rd.read(); if(done) break;
      buf+=dec.decode(value,{stream:true}); let i;
      while((i=buf.indexOf('\n\n'))>=0){
        const frame=buf.slice(0,i); buf=buf.slice(i+2);
        for(const line of frame.split('\n')){
          if(line.startsWith('event:')) ev=line.slice(6).trim();
          else if(line.startsWith('data:')){
            const d=JSON.parse(line.slice(5).trim()||'{}');
            if(ev==='progress'){ if(typeof d==='string') S.dl.line=d; else if(d.n){ S.dl.i=d.i; S.dl.n=d.n; S.dl.line=d.file||''; } refreshDl(); }
            else if(ev==='done'){ S.dl.status='done'; refreshDl(); }
            else if(ev==='error'){ S.dl.status='idle'; S.dl.line='Setup failed: '+d; refreshDl(); }
          }
        }
      }
    }
  } catch(e){ S.dl.status='idle'; S.dl.line='Setup failed: '+e; refreshDl(); }
}
function refreshDl(){
  const w = $('#dlWrap') || $('#setDlWrap');
  if (!w) return;
  w.innerHTML = dlControlHTML();
  const b=$('#dlBtn'); if(b) b.onclick=startDownload;
}

          if(line.startsWith('event:')) ev=line.slice(6).trim();
          else if(line.startsWith('data:')){ const d=JSON.parse(line.slice(5).trim()||'{}');
            if(ev==='progress' && st) st.textContent = (typeof d==='string'?d:'working…');
            else if(ev==='done'){ if(st) st.textContent='All voice models ready ✓'; await loadVoiceStatus(); }
            else if(ev==='error'){ if(st) st.textContent='Download failed: '+d; if(b) b.disabled=false; }
          }
        }
      }
    }
  } catch(e){ if(st) st.textContent='Download failed: '+e; if(b) b.disabled=false; }
}

/* ---------- workspace & sandbox (AIO-first, host fallback) ---------- */
async function loadSandboxStatus(){
  try { const r = await fetch('/api/sandbox'); if(!r.ok) throw 0; S.sandbox = await r.json(); }
  catch(_){ S.sandbox = { enabled:false, active:false, mode:'host', workspace:'' }; }
  if (S.view==='settings' && S.section==='workspace') renderSettingsBody();
}
function sandboxPanelHTML(){
  const s = S.sandbox;
  if (!s) return '<div class="fadeUp muted">Checking workspace…</div>';
  const dot = (c)=>'<span style="width:8px;height:8px;border-radius:50%;background:'+c+';display:inline-block"></span>';
  const badge = s.active
    ? '<span style="color:#3a9c3e;font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:6px">'+dot('#3a9c3e')+'Sandbox active'+(s.toolCount?' · '+s.toolCount+' tools':'')+'</span>'
    : '<span style="color:var(--text-mute);font-size:13px;display:inline-flex;align-items:center;gap:6px">'+dot('var(--text-mute)')+'On your machine (host)</span>';
  const folder = '<svg viewBox="0 0 24 24" fill="none" stroke="#055a60" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><path d="M3 7a2 2 0 0 1 2-2h4l2 3h8a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>';
  const toggle = '<div class="srow"><div><div class="st">Prefer the AIO sandbox</div><div class="ss">Give Ada her own isolated browser, shell and code runtime. Falls back to your machine when it can\'t start.</div></div><div class="sw'+(s.enabled?' on':'')+'" id="sbxSw"><i></i></div></div>';
  const setup = (!s.active && s.enabled)
    ? '<button class="dlbtn" id="sbxSetup" style="margin-top:16px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="17" height="17"><path d="M21 16V8a2 2 0 0 0-1-1.7l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.7l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.3 7 12 12 20.7 7"/><line x1="12" y1="22" x2="12" y2="12"/></svg>Set up the sandbox · needs Docker</button>'
    : '';
  return '<div class="fadeUp" style="max-width:560px">'+
    '<div class="pill-note">'+folder+'<div><div style="font-size:14px;font-weight:600;color:var(--text)">Your workspace</div><div style="font-size:12.5px;color:var(--text-soft);word-break:break-all">'+esc(s.workspace||'')+'</div></div></div>'+
    '<div class="srow"><div class="st">Environment</div>'+badge+'</div>'+
    toggle + setup +
    '<div class="status" id="sbxStatus" style="margin-top:10px"></div>'+
    '<div class="muted" style="margin-top:14px">When the sandbox is on, Ada works inside it and anything she saves lands in your workspace folder above. Her own settings, memory and secrets stay on your machine — never inside the sandbox. New tools take effect on Ada’s next launch.</div></div>';
}
function wireSandboxPanel(){
  if (!S.sandbox){ loadSandboxStatus(); return; }
  const sw=$('#sbxSw'); if(sw) sw.onclick=async()=>{
    const en=!S.sandbox.enabled; sw.classList.toggle('on',en);
    try { const r=await fetch('/api/sandbox',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({enabled:en})}); S.sandbox.enabled=(await r.json()).enabled; }
    catch(_){ S.sandbox.enabled=en; }
    renderSettingsBody();
  };
  const b=$('#sbxSetup'); if(b) b.onclick=setupSandbox;
}
async function setupSandbox(){
  const st=$('#sbxStatus'), b=$('#sbxSetup'); if(b) b.disabled=true;
  if(st) st.textContent='Starting… first run pulls the sandbox image (this is large).';
  try {
    const res=await fetch('/api/sandbox/setup',{method:'POST'}); const rd=res.body.getReader(); const dec=new TextDecoder(); let buf='',ev='';
    while(true){ const {value,done}=await rd.read(); if(done) break; buf+=dec.decode(value,{stream:true}); let i;
      while((i=buf.indexOf('\n\n'))>=0){ const frame=buf.slice(0,i); buf=buf.slice(i+2);
        for(const line of frame.split('\n')){
          if(line.startsWith('event:')) ev=line.slice(6).trim();
          else if(line.startsWith('data:')){ const d=JSON.parse(line.slice(5).trim()||'{}');
            if(ev==='progress' && st) st.textContent=(typeof d==='string'?d:'working…');
            else if(ev==='done'){ if(st) st.textContent='Sandbox ready ✓'; await loadSandboxStatus(); }
            else if(ev==='error'){ if(st) st.textContent='Setup failed: '+d; if(b) b.disabled=false; }
          }
        }
      }
    }
  } catch(e){ if(st) st.textContent='Setup failed: '+e; if(b) b.disabled=false; }
}

/* ---------- skills (file-based, MAF) ---------- */
async function loadSkills(){
  try { const r=await fetch('/api/skills'); if(!r.ok) throw 0; S.skills=await r.json(); }
  catch(_){ S.skills={dir:'',sandboxActive:false,skills:[]}; }
  if (S.view==='settings' && S.section==='skills') renderSettingsBody();
}
function skillsPanelHTML(){
  const s=S.skills;
  if(!s) return '<div class="fadeUp muted">Checking skills…</div>';
  const book='<svg viewBox="0 0 24 24" fill="none" stroke="#055a60" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>';
  const chip=(t)=>'<span style="font-size:11px;font-weight:600;color:var(--text-soft);background:var(--surface-2,rgba(0,0,0,.05));border-radius:6px;padding:2px 8px;white-space:nowrap">'+esc(t)+'</span>';
  const list=(s.skills||[]).map(k=>{
    const badges=[]; if(k.hasScripts) badges.push(chip('scripts')); if(k.compatibility) badges.push(chip(k.compatibility));
    return '<div class="srow"><div style="flex:1"><div class="st">'+esc(k.name)+'</div><div class="ss">'+esc(k.description||'')+'</div></div><div style="display:flex;gap:6px;align-items:center">'+badges.join('')+'</div></div>';
  }).join('');
  const empty='<div class="muted" style="margin:14px 0">No skills yet. Drop a skill folder — a <b>SKILL.md</b> plus optional <b>scripts/</b> — into the folder below, then relaunch Ada.</div>';
  const runner=s.sandboxActive
    ? '<span style="color:#3a9c3e;font-weight:600;font-size:13px">Runs in the sandbox</span>'
    : '<span style="color:var(--text-mute);font-size:13px">Needs the sandbox — turn it on in Workspace &amp; sandbox</span>';
  return '<div class="fadeUp" style="max-width:560px">'+
    '<div class="pill-note">'+book+'<div><div style="font-size:14px;font-weight:600;color:var(--text)">Skills folder</div><div style="font-size:12.5px;color:var(--text-soft);word-break:break-all">'+esc(s.dir||'')+'</div></div></div>'+
    '<div class="srow"><div class="st">Bundled scripts</div>'+runner+'</div>'+
    ((s.skills&&s.skills.length)?list:empty)+
    '<div style="display:flex;gap:8px;margin-top:16px;flex-wrap:wrap">'+
      '<button class="dlbtn" id="skillsUpload"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="17" height="17"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>Upload a skill (.zip)</button>'+
      '<button class="dlbtn" id="skillsOpen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="17" height="17"><path d="M3 7a2 2 0 0 1 2-2h4l2 3h8a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>Open skills folder</button>'+
    '</div>'+
    '<input type="file" id="skillsFile" accept=".zip,.skill" style="display:none">'+
    '<div class="status" id="skillsUploadStatus" style="margin-top:10px"></div>'+
    '<div class="muted" style="margin-top:14px">A skill is a portable folder: a <b>SKILL.md</b> (instructions Ada loads on demand) plus optional <b>scripts/</b> (Python, executed in the sandbox), <b>references/</b> and <b>assets/</b>. Built-in skills (research, desktop) are always on.</div></div>';
}
function wireSkillsPanel(){
  if(!S.skills){ loadSkills(); return; }
  const b=$('#skillsOpen'); if(b) b.onclick=async()=>{ try{ await fetch('/api/skills/open',{method:'POST'}); }catch(_){} };
  const up=$('#skillsUpload'), file=$('#skillsFile'), st=$('#skillsUploadStatus');
  if(up&&file){
    up.onclick=()=>file.click();
    file.onchange=async()=>{
      const f=file.files&&file.files[0]; if(!f) return;
      if(st) st.textContent='Validating & installing “'+f.name+'”…';
      try{
        const r=await fetch('/api/skills/upload',{method:'POST',body:f});
        const j=await r.json();
        if(j&&j.ok){ if(st) st.textContent='Installed “'+esc(j.name)+'” ✓ — relaunch Ada to use it.'; await loadSkills(); }
        else { if(st) st.textContent='Could not install: '+esc((j&&j.error)||'unknown error'); }
      }catch(e){ if(st) st.textContent='Upload failed: '+e; }
      file.value='';
    };
  }
}

/* ---------- global keys ---------- */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape'){
    if (voice){ stopVoice(); return; }
    if (S.view==='settings'){ setView('main'); return; }
  }
});

/* ---------- init ---------- */
(async function init(){
  emptyState();
  try {
    const cfg = await (await fetch('/api/config')).json();
    S.config = cfg;
    if (cfg.profile) S.profile = cfg.profile;
    if (typeof cfg.autostart === 'boolean') S.autostart = cfg.autostart;
    if (cfg.catalog) S.catalog = cfg.catalog;
    try { const mj = await (await fetch('/api/models')).json(); S.onnxModels = mj.models||[]; } catch(_){}
    loadVoiceStatus();
    loadSandboxStatus();
    loadSkills();
    setView(cfg.setupComplete ? 'main' : 'wizard');
  } catch(_){ setView('main'); setWidget('idle'); }
})();
</script>
</body>
