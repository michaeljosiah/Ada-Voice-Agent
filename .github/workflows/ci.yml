name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    # Ada is Windows-only (WinForms tray app, DPAPI credential vault, WASAPI audio, WebView2).
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Ada.slnx

      - name: Build
        run: dotnet build Ada.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Ada.slnx --configuration Release --no-build
