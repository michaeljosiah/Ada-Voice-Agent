name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.0)'
        required: true

permissions:
  contents: write   # create the GitHub Release and upload assets

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing $VERSION"

      - name: Build
        run: dotnet build Ada.slnx --configuration Release -p:Version=${{ steps.version.outputs.version }}

      - name: Test
        # See ci.yml for why this one pre-existing test is filtered out.
        run: >-
          dotnet test Ada.slnx --configuration Release --no-build
          --filter "FullyQualifiedName!~Default_options_target_gemma4_on_loopback"

      # Two deliverables: the tray app (Ada.App) and the CLI (ada). Self-contained win-x64 folders so
      # end users don't need a .NET runtime installed; framework-dependent would be smaller but adds a
      # prerequisite. Not single-file — WinForms + the native speech runtimes are most robust unpacked.
      - name: Publish tray app
        run: >-
          dotnet publish src/Ada.App/Ada.App.csproj --configuration Release
          -r win-x64 --self-contained true -p:PublishSingleFile=false
          -p:Version=${{ steps.version.outputs.version }} -o publish/app

      - name: Publish CLI
        run: >-
          dotnet publish src/Ada.Cli/Ada.Cli.csproj --configuration Release
          -r win-x64 --self-contained true -p:PublishSingleFile=false
          -p:Version=${{ steps.version.outputs.version }} -o publish/cli

      - name: Package
        shell: pwsh
        run: |
          $v = "${{ steps.version.outputs.version }}"
          Compress-Archive -Path publish/app/* -DestinationPath "Ada-App-win-x64-$v.zip" -Force
          Compress-Archive -Path publish/cli/* -DestinationPath "ada-cli-win-x64-$v.zip" -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', steps.version.outputs.version) || github.ref_name }}
          name: Ada ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            Ada-App-win-x64-${{ steps.version.outputs.version }}.zip
            ada-cli-win-x64-${{ steps.version.outputs.version }}.zip
